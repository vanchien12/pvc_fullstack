<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cửa hàng online</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <h1>🛍️ Cửa hàng online</h1>
  <div style="display:flex; align-items:center; gap:16px;">
    <nav>
      <a href="/admin">Trang quản trị</a>
    </nav>
    <button id="cart-toggle">🛒 Giỏ hàng (<span id="cart-count">0</span>)</button>
  </div>
</header>

<main>

  <div class="card">
    <div class="section-title">➕ Thêm sản phẩm mới</div>
    <p style="font-size:13px; color:#888; margin-bottom:10px;">
      * Cần đăng nhập admin để thêm sản phẩm. <a href="/admin">Đăng nhập tại đây</a> rồi quay lại trang này.
    </p>
    <div id="add-product-msg"></div>
    <form id="add-product-form">
      <div class="form-grid">
        <div>
          <label>Tên sản phẩm</label>
          <input type="text" id="p-name" required />
        </div>
        <div>
          <label>Giá (VNĐ)</label>
          <input type="number" id="p-price" min="0" required />
        </div>
        <div>
          <label>Số lượng tồn kho</label>
          <input type="number" id="p-stock" min="0" value="0" />
        </div>
        <div>
          <label>Link ảnh (URL)</label>
          <input type="text" id="p-image" placeholder="https://..." />
        </div>
      </div>
      <div style="margin-bottom:12px;">
        <label>Mô tả</label>
        <textarea id="p-description" rows="2"></textarea>
      </div>
      <button type="submit" class="btn">Thêm sản phẩm</button>
    </form>
  </div>

  <div class="section-title">Sản phẩm</div>
  <div id="product-list"></div>

</main>

<!-- Giỏ hàng (sidebar) -->
<div id="cart-overlay"></div>
<aside id="cart-sidebar">
  <header>
    <h2 style="font-size:16px;">Giỏ hàng của bạn</h2>
    <button id="cart-close" style="background:none;border:none;font-size:20px;cursor:pointer;">✕</button>
  </header>
  <div id="cart-items"></div>
  <div id="cart-footer">
    <div id="cart-total">
      <span>Tổng cộng:</span>
      <span id="cart-total-value">0₫</span>
    </div>

    <div id="checkout-form-wrap">
      <div id="checkout-msg"></div>
      <form id="checkout-form">
        <label>Họ tên *</label>
        <input type="text" id="c-name" required />
        <label>Số điện thoại</label>
        <input type="text" id="c-phone" />
        <label>Địa chỉ giao hàng</label>
        <input type="text" id="c-address" />
        <button type="submit" class="btn success" style="width:100%; margin-top:8px;">Đặt hàng / Thanh toán</button>
      </form>
    </div>
  </div>
</aside>

<script src="app.js"></script>
</body>
</html>
