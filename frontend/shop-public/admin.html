<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Quản trị viên</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <h1>🔐 Trang quản trị</h1>
  <nav>
    <a href="/">Về trang chủ</a>
    <a href="#" id="logout-link" class="hidden">Đăng xuất</a>
  </nav>
</header>

<!-- Form đăng nhập -->
<div id="login-box">
  <h2>Đăng nhập Admin</h2>
  <div id="login-msg"></div>
  <form id="login-form">
    <label>Tên đăng nhập</label>
    <input type="text" id="login-username" required />
    <label>Mật khẩu</label>
    <input type="password" id="login-password" required />
    <button type="submit" class="btn" style="width:100%;">Đăng nhập</button>
  </form>
  <p style="font-size:12px; color:#999; margin-top:10px;">
    Mặc định: admin / admin123 (vui lòng đổi sau khi đăng nhập)
  </p>
</div>

<!-- Dashboard sau khi đăng nhập -->
<main id="dashboard" class="hidden">
  <div class="section-title">📦 Danh sách đơn hàng cần duyệt</div>
  <div id="orders-msg"></div>
  <table>
    <thead>
      <tr>
        <th>Mã đơn</th>
        <th>Khách hàng</th>
        <th>SĐT</th>
        <th>Sản phẩm</th>
        <th>Tổng tiền</th>
        <th>Trạng thái</th>
        <th>Hành động</th>
      </tr>
    </thead>
    <tbody id="orders-table-body"></tbody>
  </table>
</main>

<script src="admin.js"></script>
</body>
</html>
